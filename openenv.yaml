name: memory-management-rl
version: "1.0.0"
description: >
  An OpenEnv-compatible benchmark for training and evaluating LLM-based memory
  management policies under a hard token budget. Agents must decide what to
  store, refresh, update, retrieve, or ignore across realistic multi-turn
  conversations while handling corrections, misleading confabulations, and
  formatting constraints.

author: "memory-mgmt-with-rl-openenv"
license: MIT

server:
  host: "0.0.0.0"
  port: 7860
  base_url: "http://localhost:7860"

endpoints:
  reset:
    method: POST
    path: /reset
    description: Start a new episode. Returns a session id and the first observation.
    request_schema:
      type: object
      properties:
        task_id:
          type: string
          description: "One of: easy_preference_recall | medium_preference_constraint_correction | hard_full_memory_management"
        seed:
          type: integer
          description: Optional RNG seed for reproducibility.
        session_id:
          type: string
          description: Optional caller-provided session id.
    response_schema:
      type: object
      required: [session_id, task_id, observation]
      properties:
        session_id:
          type: string
        task_id:
          type: string
        observation:
          $ref: "#/schemas/Observation"

  step:
    method: POST
    path: /step
    description: Advance the episode by one action. Returns the next observation, reward, and terminal state.
    request_schema:
      type: object
      required: [session_id, action]
      properties:
        session_id:
          type: string
        action:
          $ref: "#/schemas/Action"
    response_schema:
      type: object
      required: [session_id, reward, done, info]
      properties:
        session_id:
          type: string
        observation:
          oneOf:
            - $ref: "#/schemas/Observation"
            - type: "null"
        reward:
          type: number
          minimum: -1.0
          maximum: 2.0
        done:
          type: boolean
        info:
          type: object

  tasks:
    method: GET
    path: /tasks
    description: List the task catalog together with the action and observation schemas.
    response_schema:
      type: object
      required: [tasks, action_schema, observation_schema]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/schemas/TaskDefinition"
        action_schema:
          type: object
        observation_schema:
          type: object

  grader:
    method: POST
    path: /grader
    description: Score a completed episode and return the normalized score and grader breakdown.
    request_schema:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
    response_schema:
      type: object
      required: [session_id, task_id, score, metrics, final_answer]
      properties:
        session_id:
          type: string
        task_id:
          type: string
        score:
          type: number
          minimum: 0.0
          maximum: 1.0
        metrics:
          type: object
          description: 15-dimensional deterministic grading breakdown including constraint adherence.
        final_answer:
          type: string

  baseline:
    method: GET
    path: /baseline
    description: Run the built-in baseline agents across the available tasks and return their scores.
    response_schema:
      type: object
      required: [baseline_scores, seeds_used]
      properties:
        baseline_scores:
          type: object
        seeds_used:
          type: array
          items:
            type: integer

tasks:
  - id: easy_preference_recall
    name: "Single Preference Recall"
    difficulty: easy
    memory_budget: 300
    max_turns: 5
    description: >
      Short, realistic conversation with one explicit preference and light noise.
      Turn kind is exposed to make the environment approachable.

  - id: medium_preference_constraint_correction
    name: "Preference + Constraint with Correction"
    difficulty: medium
    memory_budget: 200
    max_turns: 7
    description: >
      Turn kind is hidden. The agent must infer a preference, a formatting
      constraint, and a correction from natural language, then answer in the
      correct format.

  - id: hard_full_memory_management
    name: "Full Memory Management Under Pressure"
    difficulty: hard
    memory_budget: 120
    max_turns: 8
    description: >
      Turn kind is hidden. The conversation mixes a true preference, a true
      constraint, project context, a misleading confabulation turn, and two
      corrections under a tight budget with memory decay.

schemas:
  Action:
    type: object
    required: [type]
    properties:
      type:
        type: string
        enum: [store, store_summary, ignore, retrieve, update, delete, answer]
      text:
        type: string
        description: Text payload for store, store_summary, update, answer, or retrieve-by-query.
      ids:
        type: array
        items:
          type: string
        description: Memory item ids for retrieve, update, or delete.

  Observation:
    type: object
    required:
      - current_user_message
      - current_turn_kind
      - recent_conversation
      - memory_bank
      - memory_budget_remaining
      - step_number
    properties:
      current_user_message:
        type: string
      current_turn_kind:
        type: string
        enum: [preference, constraint, correction, project_info, distractor, confabulation, recall_check, final_query, unknown]
      recent_conversation:
        type: array
        items:
          $ref: "#/schemas/ConversationTurn"
      memory_bank:
        type: array
        items:
          $ref: "#/schemas/MemoryItem"
      memory_budget_remaining:
        type: integer
      step_number:
        type: integer
      episode_metadata:
        type: object

  ConversationTurn:
    type: object
    required: [turn_id, text, kind]
    properties:
      turn_id:
        type: integer
      text:
        type: string
      kind:
        type: string
        enum: [preference, constraint, correction, project_info, distractor, confabulation, recall_check, final_query, unknown]
      memory_type:
        oneOf:
          - type: string
            enum: [preference, constraint, project_info]
          - type: "null"
      tags:
        type: array
        items:
          type: string
      metadata:
        type: object

  MemoryItem:
    type: object
    required: [id, text, type, created_at, last_used, token_length]
    properties:
      id:
        type: string
      text:
        type: string
      type:
        type: string
        enum: [preference, constraint, project_info]
      created_at:
        type: integer
      last_used:
        type: integer
      token_length:
        type: integer
      utility_score:
        type: number
      source_turn:
        type: integer
      metadata:
        type: object

  TaskDefinition:
    type: object
    required: [task_id, name, description, difficulty, memory_budget, max_turns]
    properties:
      task_id:
        type: string
      name:
        type: string
      description:
        type: string
      difficulty:
        type: string
        enum: [easy, medium, hard]
      memory_budget:
        type: integer
      max_turns:
        type: integer
      seed_range:
        type: array
        items:
          type: integer
      expected_score_range:
        type: array
        items:
          type: number
      expose_turn_kind:
        type: boolean
      decay_rate:
        type: number

reward:
  type: dense_plus_delayed
  range: [0.0, 1.0]
  description: >
    Dense rewards fire on each store, ignore, retrieve, update, delete, or
    answer step. A terminal reward is computed from deterministic grader metrics:
      R = 0.40*success + 0.18*precision + 0.12*recall
        + 0.10*constraint_adherence + 0.05*compactness
        + 0.05*freshness + 0.10*non_interference - penalties
    Scores are clamped to [0.0, 1.0].

baseline:
  agent: RuleBasedMemoryAgent
  description: >
    Deterministic heuristic agent. It performs reasonably on the easy task,
    degrades on medium when turn kinds are hidden, and drops further on hard
    because confabulations, multiple corrections, and decay require stronger
    reasoning than simple rules.
  script: run_baseline.py
